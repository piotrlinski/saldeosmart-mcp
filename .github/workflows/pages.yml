# Publish docs/ to GitHub Pages.
#
# To enable this workflow once:
#   1. Push this file to the default branch.
#   2. In the repo settings, go to Settings → Pages.
#   3. Under "Build and deployment", choose Source = "GitHub Actions".
#   4. The next push to master that touches docs/ (or a manual run via the
#      Actions tab) will publish the site at
#      https://<owner>.github.io/<repo>/.
#
# This workflow does no Jekyll processing — docs/.nojekyll opts out — so the
# directory is served verbatim as static HTML/CSS/JS.

name: Deploy docs to GitHub Pages

on:
  push:
    branches: [master]
    paths:
      - "docs/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:  # allow manual runs from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one in-flight Pages deploy at a time. Skip queued runs if a newer
# one supersedes them — no point publishing stale docs.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload docs artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
