# Release-drafter config — autogenerates release notes from merged PRs
# grouped by label. Apply labels via PR template or via PR-labeler.

name-template: "v$RESOLVED_VERSION"
tag-template:  "v$RESOLVED_VERSION"

categories:
  - title: "✨ Features"
    labels:
      - "feature"
      - "enhancement"
  - title: "🐛 Fixes"
    labels:
      - "fix"
      - "bug"
  - title: "📚 Documentation"
    labels:
      - "documentation"
      - "docs"
  - title: "🔧 Maintenance"
    labels:
      - "chore"
      - "refactor"
      - "deps"
      - "ci"
      - "test"
  - title: "💥 Breaking"
    labels:
      - "breaking"

change-template: "- $TITLE (#$NUMBER) @$AUTHOR"
change-title-escapes: '\<*_&'

version-resolver:
  major:
    labels:
      - "breaking"
  minor:
    labels:
      - "feature"
      - "enhancement"
  patch:
    labels:
      - "fix"
      - "bug"
      - "chore"
      - "docs"
      - "documentation"
  default: patch

template: |
  ## What's changed

  $CHANGES

  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
